version: '3.8'

services:
  # HexaSend Application (No database - uses in-memory file storage)
  hexasend-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hexasend-app:latest
    container_name: hexasend-app
    restart: always
    ports:
      - "${APP_PORT:-3001}:5000"
    volumes:
      - ${UPLOAD_DIR:-./uploads}:/tmp/secureshare
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      UPLOAD_DIR: "/tmp/secureshare"
