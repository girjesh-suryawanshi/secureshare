# HexaSend Nginx Configuration for hexadsend.com
# Place this file in /etc/nginx/sites-available/hexadsend

server {
    listen 80;
    server_name hexasend.com www.hexasend.com;
    
    # Redirect HTTP to HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;
}

server {
    # listen 443 ssl; # Port 443 for HTTPS (managed by Certbot)
    server_name hexasend.com www.hexasend.com;

    # SSL Certificates (managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/hexasend.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hexasend.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Increase client max body size for file uploads
    client_max_body_size 1G;

    location / {
        proxy_pass http://localhost:3001;  # Forward to HexaSend app (Docker APP_PORT)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for large file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Handle WebSocket connections for file transfers
    location /ws {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}