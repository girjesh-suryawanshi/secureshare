# HexaSend Nginx Configuration for hexasend.com
# Updated with Production SSL and streaming optimizations

server {
    server_name hexasend.com www.hexasend.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Increase client max body size for file uploads
    client_max_body_size 1G;

    location / {
        proxy_pass http://localhost:3001;  # Forward to HexaSend app
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable buffering for real-time file streaming (CRITICAL for production)
        proxy_buffering off;
        proxy_request_buffering off;

        # Increased timeouts for large file transfers (up to 1GB)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Handle WebSocket connections for file transfers
    location /ws {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Consistent timeouts for WebSockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hexasend.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hexasend.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.hexasend.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = hexasend.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name hexasend.com www.hexasend.com;
    return 404; # managed by Certbot
}